# /etc/nginx/sites-available/medclinik-api
# Reverse proxy pour MedClinik API (NestJS sur Docker port 3006)
# Gestion CORS complète pour autoriser medclinic.lamine-gaye.tech

server {
    listen 80;
    server_name medclinik.backnd-api.cloud;

    # Redirection automatique vers HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name medclinik.backnd-api.cloud;

    # ─── Certificats SSL (Let's Encrypt via Certbot) ───────────────────
    ssl_certificate     /etc/letsencrypt/live/medclinik.backnd-api.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/medclinik.backnd-api.cloud/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ─── En-têtes de sécurité ──────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ─── CORS : origines autorisées ────────────────────────────────────
    # NOTE : NestJS gère déjà CORS via enableCors(). Ces directives Nginx
    # servent de filet de sécurité pour les requêtes preflight OPTIONS
    # qui peuvent être bloquées avant d'atteindre NestJS.
    set $cors_origin "";
    if ($http_origin ~* "^https://(medclinic\.lamine-gaye\.tech|localhost:3000)$") {
        set $cors_origin $http_origin;
    }

    # Répondre immédiatement aux requêtes preflight OPTIONS
    if ($request_method = 'OPTIONS') {
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, X-Requested-With' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Max-Age' '86400' always;
        add_header 'Content-Type' 'text/plain; charset=utf-8';
        add_header 'Content-Length' '0';
        return 204;
    }

    # ─── Proxy vers NestJS sur Docker ─────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3006;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Augmenter les timeouts pour les opérations longues (ex. DICOM upload)
        proxy_read_timeout    300s;
        proxy_connect_timeout 75s;
        proxy_send_timeout    300s;

        # Taille max des uploads (fichiers DICOM, PDF médicaux)
        client_max_body_size 50M;
    }

    # ─── WebSockets (Socket.io pour les mises à jour en temps réel) ───
    location /socket.io/ {
        proxy_pass         http://127.0.0.1:3006;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
    }

    # ─── Fichiers uploadés (DICOM, ordonnances PDF) ───────────────────
    location /uploads/ {
        proxy_pass http://127.0.0.1:3006/uploads/;
    }

    # ─── Swagger API Docs ──────────────────────────────────────────────
    location /api/docs {
        proxy_pass http://127.0.0.1:3006/api/docs;
    }
}
