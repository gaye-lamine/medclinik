services:
  medclinik-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medclinik-backend
    restart: always
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.medclinik.entrypoints=websecure"
      - "traefik.http.routers.medclinik.rule=Host(`medclinik.backnd-api.cloud`)"
      - "traefik.http.routers.medclinik.tls.certresolver=letsencrypt"
      - "traefik.http.services.medclinik.loadbalancer.server.port=3006"
      # ─── Middleware CORS Traefik ───────────────────────────────────────────
      - "traefik.http.routers.medclinik.middlewares=medclinik-cors@docker"
      - "traefik.http.middlewares.medclinik-cors.headers.accesscontrolallowmethods=GET,POST,PUT,PATCH,DELETE,OPTIONS"
      - "traefik.http.middlewares.medclinik-cors.headers.accesscontrolallowheaders=Authorization,Content-Type,Accept,X-Requested-With"
      - "traefik.http.middlewares.medclinik-cors.headers.accesscontrolalloworiginlist=https://medclinic.lamine-gaye.tech,http://localhost:3000,http://localhost:3005"
      - "traefik.http.middlewares.medclinik-cors.headers.accesscontrolallowcredentials=true"
      - "traefik.http.middlewares.medclinik-cors.headers.accesscontrolmaxage=86400"
      - "traefik.http.middlewares.medclinik-cors.headers.addvaryheader=true"
    ports:
      - "3010:3006"
    env_file:
      - .env
    volumes:
      - ./uploads:/app/uploads
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://medclinik_user:medclinik_password@medclinik-db:5432/medclinik_db?schema=public
      - REDIS_URL=redis://medclinik-redis:6379
    depends_on:
      - medclinik-db
      - medclinik-redis

  medclinik-db:
    image: postgres:14
    container_name: medclinik-db
    restart: always
    environment:
      POSTGRES_USER: medclinik_user
      POSTGRES_PASSWORD: medclinik_password
      POSTGRES_DB: medclinik_db
    ports:
      - "5434:5432"
    volumes:
      - medclinik_postgres_data:/var/lib/postgresql/data

  # ─── Redis : rate limiting SMS (fenêtre glissante) ──────────────────────
  medclinik-redis:
    image: redis:7-alpine
    container_name: medclinik-redis
    restart: always
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - medclinik_redis_data:/data
    # Redis exposé uniquement en interne (pas de port public)

volumes:
  medclinik_postgres_data:
  medclinik_redis_data:

